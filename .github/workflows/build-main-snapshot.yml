name: Build Main Snapshot

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-main-snapshot
  cancel-in-progress: true

env:
  APP_NAME: NyaTerm
  SNAPSHOT_TAG: main-snapshot
  SNAPSHOT_VERSION: main-snapshot
  SNAPSHOT_RELEASE_NAME: NyaTerm Main Snapshot

jobs:
  prepare:
    name: Resolve main commit
    runs-on: ubuntu-latest

    outputs:
      main_sha: ${{ steps.resolve.outputs.main_sha }}

    steps:
      - name: Resolve main branch SHA
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          MAIN_SHA="$(git ls-remote "https://github.com/${GITHUB_REPOSITORY}.git" refs/heads/main | awk '{print $1}')"

          if [ -z "${MAIN_SHA}" ]; then
            echo "Failed to resolve origin/main"
            exit 1
          fi

          echo "main_sha=${MAIN_SHA}" >> "${GITHUB_OUTPUT}"
          echo "Resolved main SHA: ${MAIN_SHA}"

  build:
    name: Build ${{ matrix.target }}
    needs: prepare
    runs-on: ${{ matrix.platform }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            os_name: macos
            arch: arm64
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin

          - platform: macos-latest
            os_name: macos
            arch: x64
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin

          - platform: ubuntu-22.04
            os_name: linux
            arch: x64
            target: x86_64-unknown-linux-gnu
            args: ""

          - platform: ubuntu-22.04-arm
            os_name: linux
            arch: arm64
            target: aarch64-unknown-linux-gnu
            args: ""

          - platform: windows-latest
            os_name: windows
            arch: x64
            target: x86_64-pc-windows-msvc
            args: --bundles nsis

          - platform: windows-latest
            os_name: windows
            arch: arm64
            target: aarch64-pc-windows-msvc
            args: --target aarch64-pc-windows-msvc --bundles nsis

    steps:
      - name: Checkout main commit
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.main_sha }}
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        if: matrix.target != 'x86_64-unknown-linux-gnu' && matrix.target != 'x86_64-pc-windows-msvc'
        run: rustup target add ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            ./src-tauri -> target
          key: main-snapshot-${{ matrix.platform }}-${{ matrix.target }}
          cache-on-failure: false
        env:
          RUST_CACHE_COMPRESS: true

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Linux dependencies
        if: contains(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libudev-dev \
            pkg-config \
            build-essential \
            curl \
            wget \
            file \
            xdg-utils

          if [ "${{ matrix.platform }}" = "ubuntu-22.04-arm" ]; then
            sudo apt-get install -y libfuse2
          fi

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare Tauri updater signing key
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY_B64: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_B64 }}
        run: |
          set -euo pipefail

          if [ -z "${TAURI_SIGNING_PRIVATE_KEY_B64:-}" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY_B64 is empty"
            exit 1
          fi

          node <<'NODE'
          const fs = require('fs');
          const os = require('os');
          const path = require('path');

          const keyB64 = process.env.TAURI_SIGNING_PRIVATE_KEY_B64 || '';
          const runnerTemp = process.env.RUNNER_TEMP || os.tmpdir();
          const keyPath = path.join(runnerTemp, 'tauri-updater.key');

          fs.writeFileSync(keyPath, Buffer.from(keyB64, 'base64'));
          fs.appendFileSync(process.env.GITHUB_ENV, `TAURI_SIGNING_PRIVATE_KEY=${keyPath}\n`);

          console.log(`Tauri updater signing key prepared at: ${keyPath}`);
          NODE

      - name: Verify GitHub Gist OAuth Client ID
        shell: bash
        env:
          NYATERM_GITHUB_GIST_CLIENT_ID: ${{ vars.NYATERM_GITHUB_GIST_CLIENT_ID }}
        run: |
          set -euo pipefail

          if [ -z "${NYATERM_GITHUB_GIST_CLIENT_ID:-}" ]; then
            echo "NYATERM_GITHUB_GIST_CLIENT_ID repository variable is required for snapshot builds."
            exit 1
          fi

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPIMAGE_EXTRACT_AND_RUN: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && '1' || '' }}
          NYATERM_GITHUB_GIST_CLIENT_ID: ${{ vars.NYATERM_GITHUB_GIST_CLIENT_ID }}
        with:
          includeUpdaterJson: false
          args: ${{ matrix.args }}

      - name: Collect macOS assets
        if: matrix.os_name == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist-release

          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"

          DMG_FILE="$(find "${BUNDLE_DIR}" -type f -name '*.dmg' | head -n 1 || true)"
          if [ -z "${DMG_FILE}" ]; then
            echo "No dmg file found under ${BUNDLE_DIR}"
            exit 1
          fi

          cp "${DMG_FILE}" "dist-release/${APP_NAME}_${SNAPSHOT_VERSION}_macos_${{ matrix.arch }}.dmg"

          APP_TAR_FILE="$(find "${BUNDLE_DIR}" -type f -name '*.app.tar.gz' | head -n 1 || true)"
          if [ -n "${APP_TAR_FILE}" ]; then
            cp "${APP_TAR_FILE}" "dist-release/${APP_NAME}_${SNAPSHOT_VERSION}_macos_${{ matrix.arch }}.app.tar.gz"
          fi

          find dist-release -maxdepth 1 -type f -print

      - name: Collect Linux assets
        if: matrix.os_name == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist-release

          BUNDLE_DIR="src-tauri/target/release/bundle"

          APPIMAGE_FILE="$(find "${BUNDLE_DIR}" -type f -name '*.AppImage' | head -n 1 || true)"
          DEB_FILE="$(find "${BUNDLE_DIR}" -type f -name '*.deb' | head -n 1 || true)"
          RPM_FILE="$(find "${BUNDLE_DIR}" -type f -name '*.rpm' | head -n 1 || true)"

          if [ -z "${APPIMAGE_FILE}" ] && [ -z "${DEB_FILE}" ] && [ -z "${RPM_FILE}" ]; then
            echo "No Linux bundle assets found under ${BUNDLE_DIR}"
            exit 1
          fi

          if [ -n "${APPIMAGE_FILE}" ]; then
            cp "${APPIMAGE_FILE}" "dist-release/${APP_NAME}_${SNAPSHOT_VERSION}_linux_${{ matrix.arch }}.AppImage"
          fi

          if [ -n "${DEB_FILE}" ]; then
            cp "${DEB_FILE}" "dist-release/${APP_NAME}_${SNAPSHOT_VERSION}_linux_${{ matrix.arch }}.deb"
          fi

          if [ -n "${RPM_FILE}" ]; then
            cp "${RPM_FILE}" "dist-release/${APP_NAME}_${SNAPSHOT_VERSION}_linux_${{ matrix.arch }}.rpm"
          fi

          find dist-release -maxdepth 1 -type f -print

      - name: Collect Windows assets
        if: matrix.os_name == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          New-Item -ItemType Directory -Path "dist-release" -Force | Out-Null

          $target = "${{ matrix.target }}"
          $arch = "${{ matrix.arch }}"
          $snapshotVersion = "${{ env.SNAPSHOT_VERSION }}"
          $appName = "${{ env.APP_NAME }}"

          if ($target -eq "aarch64-pc-windows-msvc") {
            $releaseDir = Join-Path "src-tauri/target" "$target/release"
          } else {
            $releaseDir = "src-tauri/target/release"
          }

          $bundleDir = Join-Path $releaseDir "bundle/nsis"
          $setupExe = Get-ChildItem -Path $bundleDir -Filter "*setup.exe" -Recurse |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $setupExe -or -not (Test-Path $setupExe)) {
            throw "Windows setup exe not found under $bundleDir"
          }

          Copy-Item -LiteralPath $setupExe -Destination "dist-release/${appName}_${snapshotVersion}_windows_${arch}-setup.exe"

          $exe = Join-Path $releaseDir "nyaterm.exe"
          if (-not (Test-Path $exe)) {
            $exe = Get-ChildItem -Path $releaseDir -Filter "*.exe" |
              Where-Object { $_.Name -notmatch 'build[-_]script' } |
              Select-Object -First 1 -ExpandProperty FullName
          }

          if (-not $exe -or -not (Test-Path $exe)) {
            throw "Release executable not found in $releaseDir"
          }

          $portableRoot = Join-Path $env:RUNNER_TEMP "NyaTerm-portable-package"
          $portableDir = Join-Path $portableRoot "NyaTerm-portable"
          $dataDir = Join-Path $portableDir "data"
          $portableZip = "dist-release/${appName}_${snapshotVersion}_windows_${arch}_portable.zip"

          Remove-Item -LiteralPath $portableRoot -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $dataDir -Force | Out-Null
          Copy-Item -LiteralPath $exe -Destination (Join-Path $portableDir "NyaTerm.exe")
          New-Item -ItemType File -Path (Join-Path $portableDir "portable.flag") -Force | Out-Null
          New-Item -ItemType File -Path (Join-Path $dataDir ".keep") -Force | Out-Null

          Compress-Archive -Path $portableDir -DestinationPath $portableZip -Force

          Get-ChildItem -Path "dist-release" -File | ForEach-Object {
            Write-Host $_.FullName
          }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ matrix.os_name }}-${{ matrix.arch }}
          path: dist-release/*
          if-no-files-found: error
          retention-days: 7

  publish-github-release:
    name: Publish GitHub snapshot release
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout main commit
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.main_sha }}
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        shell: bash
        run: |
          set -euo pipefail
          find release-assets -maxdepth 1 -type f -print | sort

      - name: Move snapshot tag to main commit
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -f "${SNAPSHOT_TAG}" "${{ needs.prepare.outputs.main_sha }}"
          git push -f origin "refs/tags/${SNAPSHOT_TAG}"

      - name: Create or update snapshot release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAIN_SHA: ${{ needs.prepare.outputs.main_sha }}
        run: |
          set -euo pipefail

          cat > release-notes.md <<EOF
          This is a manually triggered snapshot build from the main branch.

          Source commit: ${MAIN_SHA}

          This release is overwritten by each successful main snapshot build.
          It is intended for testing only and is not a stable release.
          EOF

          if gh release view "${SNAPSHOT_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "${SNAPSHOT_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${SNAPSHOT_RELEASE_NAME}" \
              --notes-file release-notes.md \
              --prerelease
          else
            gh release create "${SNAPSHOT_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${SNAPSHOT_RELEASE_NAME}" \
              --notes-file release-notes.md \
              --prerelease \
              --target "${MAIN_SHA}"
          fi

      - name: Remove old snapshot assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          mapfile -t ASSETS < <(
            gh release view "${SNAPSHOT_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --json assets \
              --jq '.assets[].name'
          )

          for asset in "${ASSETS[@]}"; do
            if [ -n "${asset}" ]; then
              echo "Deleting old asset: ${asset}"
              gh release delete-asset "${SNAPSHOT_TAG}" "${asset}" \
                --repo "${GITHUB_REPOSITORY}" \
                --yes
            fi
          done

      - name: Upload snapshot assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          gh release upload "${SNAPSHOT_TAG}" release-assets/* \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber

          echo "Uploaded snapshot assets to release: ${SNAPSHOT_TAG}"