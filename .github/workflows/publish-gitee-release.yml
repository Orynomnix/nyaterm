name: Publish Gitee Release

on:
  release:
    types: [published]

  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.1.13"
        required: true
        type: string
      upload_small_assets:
        description: "Upload assets smaller than MAX_GITEE_ASSET_MB to Gitee"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

concurrency:
  group: gitee-release-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  GITEE_OWNER: ${{ vars.GITEE_OWNER }}
  GITEE_REPO: ${{ vars.GITEE_REPO }}
  GITEE_API_BASE: ${{ vars.GITEE_API_BASE || 'https://gitee.com/api/v5' }}
  MAX_GITEE_ASSET_MB: ${{ vars.MAX_GITEE_ASSET_MB || '99' }}
  R2_PUBLIC_BASE_URL: ${{ vars.R2_PUBLIC_BASE_URL }}
  UPLOAD_SMALL_ASSETS: ${{ inputs.upload_small_assets || 'true' }}
  FAIL_ON_GITEE_ASSET_UPLOAD_ERROR: "false"

jobs:
  publish-gitee-release:
    name: Create or update Gitee Release
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${{ inputs.tag }}"
          fi

          if [[ -z "$TAG" ]]; then
            echo "::error::Release tag is empty"
            exit 1
          fi

          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "Publishing Gitee release for tag: $TAG"

      - name: Validate Gitee config
        shell: bash
        run: |
          if [[ -z "${GITEE_OWNER}" ]]; then
            echo "::error::GITEE_OWNER is empty. Please set it in GitHub repository Variables."
            exit 1
          fi

          if [[ -z "${GITEE_REPO}" ]]; then
            echo "::error::GITEE_REPO is empty. Please set it in GitHub repository Variables."
            exit 1
          fi

          echo "Gitee repository: ${GITEE_OWNER}/${GITEE_REPO}"

      - name: Wait for Gitee mirror tag
        shell: bash
        run: |
          echo "Waiting for Gitee mirror tag: ${TAG}"

          for i in {1..30}; do
            if git ls-remote --tags "https://gitee.com/${GITEE_OWNER}/${GITEE_REPO}.git" "refs/tags/${TAG}" | grep -q "refs/tags/${TAG}$"; then
              echo "Gitee tag found: ${TAG}"
              exit 0
            fi

            echo "Gitee tag ${TAG} not found yet, waiting 20s... ($i/30)"
            sleep 20
          done

          echo "::error::Gitee tag ${TAG} was not found after waiting. Make sure GitHub -> Gitee mirror has synced tags."
          exit 1

      - name: Read GitHub release metadata
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release view "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --json tagName,name,body,isPrerelease,isDraft,url,targetCommitish \
            > github-release.json

          echo "GitHub release metadata:"
          jq '{ tagName, name, isPrerelease, isDraft, url, targetCommitish }' github-release.json

      - name: Download GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          mkdir -p release-assets

          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --dir release-assets \
            --clobber || true

          echo "Downloaded assets:"
          find release-assets -maxdepth 1 -type f -printf '%f %s bytes\n' | sort || true

      - name: Install Python dependencies
        shell: bash
        run: |
          python3 -m pip install --upgrade requests

      - name: Create or update Gitee release
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        shell: bash
        run: |
          python3 <<'PY'
          import json
          import mimetypes
          import os
          import pathlib
          import sys
          import time
          import urllib.parse

          import requests


          def require_env(name: str) -> str:
              value = os.environ.get(name, "").strip()
              if not value:
                  print(f"::error::{name} is required")
                  sys.exit(1)
              return value


          token = require_env("GITEE_TOKEN")
          owner = require_env("GITEE_OWNER")
          repo = require_env("GITEE_REPO")
          tag = require_env("TAG")
          api_base = os.environ.get("GITEE_API_BASE", "https://gitee.com/api/v5").rstrip("/")
          r2_public_base_url = os.environ.get("R2_PUBLIC_BASE_URL", "").strip().rstrip("/")
          max_mb = float(os.environ.get("MAX_GITEE_ASSET_MB", "95"))
          max_bytes = int(max_mb * 1024 * 1024)
          upload_small_assets = os.environ.get("UPLOAD_SMALL_ASSETS", "true").lower() == "true"
          fail_on_upload_error = os.environ.get("FAIL_ON_GITEE_ASSET_UPLOAD_ERROR", "false").lower() == "true"

          assets_dir = pathlib.Path("release-assets")
          release_json_path = pathlib.Path("github-release.json")

          if not release_json_path.exists():
              print("::error::github-release.json not found")
              sys.exit(1)

          release = json.loads(release_json_path.read_text(encoding="utf-8"))
          release_name = release.get("name") or tag
          github_body = release.get("body") or ""
          github_url = release.get("url") or ""
          is_prerelease = bool(release.get("isPrerelease"))
          target_commitish = release.get("targetCommitish") or ""

          owner_q = urllib.parse.quote(owner, safe="")
          repo_q = urllib.parse.quote(repo, safe="")
          tag_q = urllib.parse.quote(tag, safe="")

          session = requests.Session()


          def gitee_request(method: str, path: str, *, expected=(200, 201), allow_404=False, **kwargs):
              url = f"{api_base}{path}"
              params = kwargs.pop("params", {}) or {}
              params["access_token"] = token

              response = session.request(
                  method,
                  url,
                  params=params,
                  timeout=120,
                  **kwargs,
              )

              if allow_404 and response.status_code == 404:
                  return None

              if response.status_code not in expected:
                  print(f"::error::Gitee API failed: {method} {path} -> HTTP {response.status_code}")
                  print(response.text[:2000])
                  sys.exit(1)

              if response.text.strip():
                  try:
                      return response.json()
                  except Exception:
                      return response.text
              return None


          def human_size(size: int) -> str:
              units = ["B", "KB", "MB", "GB"]
              value = float(size)
              for unit in units:
                  if value < 1024 or unit == units[-1]:
                      if unit == "B":
                          return f"{int(value)} {unit}"
                      return f"{value:.2f} {unit}"
                  value /= 1024
              return f"{size} B"


          def build_r2_url(filename: str) -> str:
              if not r2_public_base_url:
                  return ""
              return f"{r2_public_base_url}/{urllib.parse.quote(tag)}/{urllib.parse.quote(filename)}"


          asset_files = []
          if assets_dir.exists():
              asset_files = sorted([p for p in assets_dir.iterdir() if p.is_file()], key=lambda p: p.name.lower())

          download_lines = []
          download_lines.append("")
          download_lines.append("---")
          download_lines.append("")
          download_lines.append("## 下载")
          download_lines.append("")
          download_lines.append("> 代码、分支、Tag 由 Gitee 镜像同步；安装包附件由 CI/CD 同步。")
          download_lines.append("")

          if asset_files:
              for file_path in asset_files:
                  size = file_path.stat().st_size
                  r2_url = build_r2_url(file_path.name)
                  size_text = human_size(size)

                  if r2_url:
                      if upload_small_assets and size <= max_bytes:
                          download_lines.append(f"- [{file_path.name}]({r2_url}) `{size_text}`（同时尝试同步到 Gitee 附件）")
                      else:
                          download_lines.append(f"- [{file_path.name}]({r2_url}) `{size_text}`")
                  else:
                      if upload_small_assets and size <= max_bytes:
                          download_lines.append(f"- `{file_path.name}` `{size_text}`（已尝试同步到 Gitee 附件）")
                      else:
                          download_lines.append(f"- `{file_path.name}` `{size_text}`（超过 Gitee 附件阈值，建议配置 R2_PUBLIC_BASE_URL）")
          else:
              download_lines.append("- 本次 GitHub Release 未检测到附件。")

          if github_url:
              download_lines.append("")
              download_lines.append(f"GitHub Release：{github_url}")

          gitee_body = github_body.rstrip() + "\n" + "\n".join(download_lines) + "\n"

          existing = gitee_request(
              "GET",
              f"/repos/{owner_q}/{repo_q}/releases/tags/{tag_q}",
              expected=(200,),
              allow_404=True,
          )

          payload = {
              "tag_name": tag,
              "name": release_name,
              "body": gitee_body,
              "prerelease": str(is_prerelease).lower(),
          }

          if target_commitish:
              payload["target_commitish"] = target_commitish

          if existing:
              release_id = existing.get("id")
              print(f"Updating existing Gitee release: id={release_id}, tag={tag}")

              updated = gitee_request(
                  "PATCH",
                  f"/repos/{owner_q}/{repo_q}/releases/{release_id}",
                  data={
                      "name": release_name,
                      "body": gitee_body,
                      "prerelease": str(is_prerelease).lower(),
                  },
                  expected=(200, 201),
              )
              release_id = updated.get("id", release_id) if isinstance(updated, dict) else release_id
          else:
              print(f"Creating Gitee release: tag={tag}")

              created = gitee_request(
                  "POST",
                  f"/repos/{owner_q}/{repo_q}/releases",
                  data=payload,
                  expected=(200, 201),
              )

              if not isinstance(created, dict) or not created.get("id"):
                  print("::error::Gitee release was created but release id was not returned")
                  print(created)
                  sys.exit(1)

              release_id = created["id"]

          print(f"Gitee release id: {release_id}")

          if not upload_small_assets:
              print("UPLOAD_SMALL_ASSETS=false, skip Gitee asset upload.")
              sys.exit(0)

          if not asset_files:
              print("No assets to upload.")
              sys.exit(0)

          uploadable_files = []
          skipped_files = []

          for file_path in asset_files:
              size = file_path.stat().st_size
              if size <= max_bytes:
                  uploadable_files.append(file_path)
              else:
                  skipped_files.append(file_path)

          for file_path in skipped_files:
              print(f"Skip large asset: {file_path.name} ({human_size(file_path.stat().st_size)} > {max_mb} MB)")

          def upload_asset(file_path: pathlib.Path):
              filename = file_path.name
              content_type = mimetypes.guess_type(filename)[0] or "application/octet-stream"

              for attempt in range(1, 4):
                  print(f"Uploading asset to Gitee: {filename}, attempt {attempt}/3")

                  try:
                      with file_path.open("rb") as f:
                          response = session.post(
                              f"{api_base}/repos/{owner_q}/{repo_q}/releases/{release_id}/attach_files",
                              params={"access_token": token},
                              data={"name": filename},
                              files={"file": (filename, f, content_type)},
                              timeout=300,
                          )
                  except Exception as exc:
                      if attempt < 3:
                          print(f"::warning::Upload failed with exception: {exc}. Retrying...")
                          time.sleep(5 * attempt)
                          continue
                      raise

                  if response.status_code in (200, 201):
                      print(f"Uploaded: {filename}")
                      return

                  text = response.text or ""
                  lowered = text.lower()

                  duplicate_markers = [
                      "already",
                      "exist",
                      "duplicate",
                      "taken",
                      "已存在",
                      "重复",
                  ]

                  if response.status_code in (400, 409, 422) and any(marker in lowered or marker in text for marker in duplicate_markers):
                      print(f"::warning::Asset may already exist, skip: {filename}")
                      print(text[:1000])
                      return

                  if attempt < 3:
                      print(f"::warning::Upload failed: HTTP {response.status_code}. Retrying...")
                      print(text[:1000])
                      time.sleep(5 * attempt)
                      continue

                  message = f"Upload failed permanently: {filename}, HTTP {response.status_code}, {text[:1000]}"

                  if fail_on_upload_error:
                      print(f"::error::{message}")
                      sys.exit(1)

                  print(f"::warning::{message}")
                  return

          for file_path in uploadable_files:
              upload_asset(file_path)

          print("Gitee release publish completed.")
          PY